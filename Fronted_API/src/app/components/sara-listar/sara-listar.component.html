<mat-card class="contenedor">
  <h1>Listar Microscopios</h1>

  <table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let item">{{ item.id }}</td>
    </ng-container>

    <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let item">{{ item.codigo }}</td>
    </ng-container>

    <ng-container matColumnDef="marca">
      <th mat-header-cell *matHeaderCellDef>Marca</th>
      <td mat-cell *matCellDef="let item">{{ item.marca }}</td>
    </ng-container>

    <ng-container matColumnDef="precio">
      <th mat-header-cell *matHeaderCellDef>Precio</th>
      <td mat-cell *matCellDef="let item">{{ item.precio | currency:'PEN':'symbol':'1.2-2' }}</td>
    </ng-container>

    <ng-container matColumnDef="fechaFabricacion">
      <th mat-header-cell *matHeaderCellDef>Fecha fabricación</th>
      <td mat-cell *matCellDef="let item">{{ item.fechaFabricacion | date:'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="estado-2">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let item">
        <span class="estado-2" [class.en-uso]="item.estado" [class.disponible]="!item.estado">
          {{ item.estado ? 'En uso' : 'Disponible' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let item">
        <button mat-flat-button color="primary" (click)="editar(item.id)" style="margin-right: 8px;">Editar</button>
        <button mat-stroked-button color="warn" (click)="eliminar(item.id)">Eliminar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSize]="8" [pageSizeOptions]="[8, 12, 16]" showFirstLastButtons></mat-paginator>
</mat-card>
