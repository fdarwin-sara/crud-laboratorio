<h2 mat-dialog-title>Confirmar eliminación</h2>

<mat-dialog-content>
  ¿Está seguro de eliminar el microscopio seleccionado?
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="warn" (click)="aceptar()">Eliminar</button>
</mat-dialog-actions>
